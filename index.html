<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浮光 Floating - Florist & Patisserie</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 客製化極簡捲軸 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body class="bg-[#0b0f19] text-slate-200 min-h-screen font-sans antialiased pb-24">

  <header class="py-8 text-center border-b border-slate-800/60 bg-[#0f172a]/80 backdrop-blur-md sticky top-0 z-40">
    <h1 class="text-3xl font-extrabold text-amber-400 tracking-widest uppercase">浮光 Floating</h1>
    <p class="text-xs text-slate-400 mt-1.5 tracking-medium">Florist & Patisserie 花藝 & 甜點店</p>
    
    <div class="max-w-md mx-auto mt-5 px-4">
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-500">
          <i class="fa-solid fa-magnifying-glass text-sm"></i>
        </span>
        <input 
          type="text" 
          id="search-input" 
          oninput="handleSearch(this.value)"
          class="w-full pl-10 pr-4 py-2 bg-slate-950/80 border border-slate-800 rounded-xl text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/50 transition-all"
          placeholder="搜尋花藝、甜點或精選商品..."
        >
      </div>
    </div>
  </header>

  <main class="max-w-xl mx-auto px-4 mt-6">
    
    <div id="category-tabs" class="flex justify-start sm:justify-center gap-2 overflow-x-auto pb-2 no-scrollbar snap-x">
      </div>

    <div id="product-list" class="mt-4 space-y-3.5">
      </div>
  </main>

  <div 
    onclick="toggleCart(true)"
    class="fixed bottom-6 right-6 bg-amber-500 hover:bg-amber-400 text-slate-950 w-14 h-14 rounded-full flex items-center justify-center shadow-2xl cursor-pointer transition-transform active:scale-95 z-50 group"
  >
    <div class="relative">
      <i class="fa-solid fa-shopping-bag text-xl"></i>
      <span 
        id="cart-badge" 
        class="absolute -top-2.5 -right-2.5 bg-rose-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center scale-0 transition-transform"
      >0</span>
    </div>
  </div>

  <div id="cart-drawer" class="fixed inset-0 z-50 pointer-events-none opacity-0 transition-opacity duration-300">
    <div onclick="toggleCart(false)" class="absolute inset-0 bg-black/60 backdrop-blur-sm pointer-events-auto"></div>
    <div class="absolute right-0 top-0 bottom-0 w-full max-w-sm bg-slate-900 border-l border-slate-800 p-6 flex flex-col pointer-events-auto transform translate-x-full transition-transform duration-300">
      <div class="flex justify-between items-center pb-4 border-b border-slate-800">
        <h3 class="text-lg font-bold text-slate-100 flex items-center gap-2">
          <i class="fa-solid fa-shopping-cart text-amber-400"></i>購物清單
        </h3>
        <button onclick="toggleCart(false)" class="text-slate-400 hover:text-white p-1">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>
      
      <div id="cart-items" class="flex-1 overflow-y-auto py-4 space-y-3">
        </div>

      <div class="pt-4 border-t border-slate-800">
        <div class="flex justify-between items-center text-sm text-slate-400 mb-4">
          <span>總計金額</span>
          <span id="cart-total" class="text-xl font-bold text-emerald-400">$0</span>
        </div>
        <button onclick="alert('串接後台結帳功能處理中！')" class="w-full py-3 bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold rounded-xl transition-colors shadow-lg">
          確認送出訂單
        </button>
      </div>
    </div>
  </div>

  <script>
    // 原始核心資料結構（未來直接與您的後台 API 動態同步過來）
    const storeData = {
      // 分類項目（後台若新增了「飲料」，只要陣列多塞一筆資料，前台就會自動渲染出來）
      categories: [
        { id: 'all', name: '全部' },
        { id: 'default', name: '預設' },
        { id: 'floral', name: '花藝' },
        { id: 'dessert', name: '甜品' }
      ],
      // 商品完整資料
      products: [
        {
          id: 1,
          name: '哈姆太郎',
          category: 'floral',
          tag: '精選推薦',
          stock: 6,
          price: 2888,
          // 暫時給予高質感的占位圖，後台可直接帶入真實上傳的路徑
          image: 'https://images.unsplash.com/photo-1526047932273-341f2a7631f9?w=400&auto=format&fit=crop&q=80'
        }
      ]
    };

    // 狀態管理
    let currentCategory = 'all';
    let searchQuery = '';
    let cart = [];

    // 1. 動態渲染分類導覽列 (Tabs) - 原功能保持且更精緻
    function renderCategories() {
      const categoryContainer = document.getElementById('category-tabs');
      if (!categoryContainer) return;

      categoryContainer.innerHTML = storeData.categories.map(cat => {
        const isActive = currentCategory === cat.id;
        return `
          <button 
            onclick="switchCategory('${cat.id}')"
            class="px-5 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all duration-200 snap-center ${
              isActive 
                ? 'bg-amber-500 text-slate-950 shadow-md font-bold scale-105' 
                : 'bg-slate-900 text-slate-400 hover:bg-slate-800 hover:text-slate-200 border border-slate-800/80'
            }"
          >
            ${cat.name}
          </button>
        `;
      }).join('');
    }

    // 2. 完美修復商品卡片 HTML - 徹底拔除引號出錯與破圖問題
    function renderProducts() {
      const productContainer = document.getElementById('product-list');
      if (!productContainer) return;

      // 複合過濾：同時篩選「分類 Tabs」以及「關鍵字搜尋」
      const filteredProducts = storeData.products.filter(p => {
        const matchesCategory = (currentCategory === 'all' || p.category === currentCategory);
        const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesCategory && matchesSearch;
      });

      if (filteredProducts.length === 0) {
        productContainer.innerHTML = `
          <div class="text-center text-slate-500 py-12 border border-dashed border-slate-800 rounded-2xl">
            <i class="fa-solid fa-box-open text-2xl mb-2 block text-slate-600"></i>
            <span class="text-sm">沒有找到相關商品</span>
          </div>
        `;
        return;
      }

      productContainer.innerHTML = filteredProducts.map(item => {
        return `
          <div class="flex items-center bg-slate-900/90 p-4 rounded-2xl text-white border border-slate-800/60 shadow-md hover:border-slate-700/60 transition-all duration-200">
            <img 
              src="${item.image}" 
              class="w-20 h-20 object-cover rounded-xl shadow-inner bg-slate-800 flex-shrink-0 border border-slate-700/30" 
              alt="${item.name}"
              onerror="this.onerror=null; this.src='https://placehold.co/100x100/1e293b/94a3b8?text=Floating';"
            >
            
            <div class="ml-4 flex-1 min-w-0">
              <div class="text-base font-bold text-slate-100 truncate">${item.name}</div>
              <div class="text-xs text-amber-500/90 font-medium mt-0.5">${item.tag || '精選推薦'}</div>
              <div class="text-slate-400 text-[11px] mt-1 flex items-center gap-1">
                <i class="fa-solid fa-box text-[10px]"></i>
                <span>現貨供應 (剩餘 ${item.stock} 件)</span>
              </div>
              
              <div class="flex justify-between items-center mt-2.5">
                <span class="text-emerald-400 font-bold text-base">$${item.price}</span>
                <button 
                  onclick="addToCart(${item.id})"
                  class="bg-amber-500 hover:bg-amber-400 active:scale-90 text-slate-950 w-7 h-7 rounded-lg font-black flex items-center justify-center transition-all shadow"
                >
                  <i class="fa-solid fa-plus text-xs"></i>
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // 3. 原分類切換功能（維持並連動渲染）
    window.switchCategory = function(catId) {
      currentCategory = catId;
      renderCategories();
      renderProducts();
    };

    // 4. 新增功能：搜尋欄位輸入監聽
    window.handleSearch = function(val) {
      searchQuery = val;
      renderProducts();
    };

    // 5. 新增功能：購物車邏輯處理
    window.addToCart = function(productId) {
      const product = storeData.products.find(p => p.id === productId);
      if (!product) return;

      const existItem = cart.find(item => item.id === productId);
      if (existItem) {
        if (existItem.quantity < product.stock) {
          existItem.quantity++;
        } else {
          alert('已達該商品庫存上限！');
          return;
        }
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      updateCartUI();
    };

    function updateCartUI() {
      // 更新懸浮 Badge 數量
      const badge = document.getElementById('cart-badge');
      const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
      
      if (totalCount > 0) {
        badge.innerText = totalCount;
        badge.classList.remove('scale-0');
        badge.classList.add('scale-100');
      } else {
        badge.classList.remove('scale-100');
        badge.classList.add('scale-0');
      }

      // 渲染購物車抽屜內品項
      const cartItemsContainer = document.getElementById('cart-items');
      const cartTotal = document.getElementById('cart-total');
      
      if (cart.length === 0) {
        cartItemsContainer.innerHTML = `<div class="text-center text-slate-500 py-8 text-sm">購物車內空空如也</div>`;
        cartTotal.innerText = '$0';
        return;
      }

      cartItemsContainer.innerHTML = cart.map(item => `
        <div class="flex justify-between items-center bg-slate-950 p-3 rounded-xl border border-slate-800">
          <div class="min-w-0 flex-1 pr-2">
            <div class="text-sm font-medium text-slate-200 truncate">${item.name}</div>
            <div class="text-xs text-emerald-400 mt-0.5">$${item.price}</div>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="changeQuantity(${item.id}, -1)" class="w-6 h-6 bg-slate-800 rounded flex items-center justify-center text-xs text-slate-400 hover:bg-slate-700">-</button>
            <span class="text-sm font-semibold text-slate-200 w-4 text-center">${item.quantity}</span>
            <button onclick="changeQuantity(${item.id}, 1)" class="w-6 h-6 bg-slate-800 rounded flex items-center justify-center text-xs text-slate-400 hover:bg-slate-700">+</button>
          </div>
        </div>
      `).join('');

      const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      cartTotal.innerText = `$${totalPrice}`;
    }

    window.changeQuantity = function(id, amount) {
      const item = cart.find(i => i.id === id);
      const product = storeData.products.find(p => p.id === id);
      if (!item) return;

      item.quantity += amount;
      if (item.quantity <= 0) {
        cart = cart.filter(i => i.id !== id);
      } else if (product && item.quantity > product.stock) {
        item.quantity = product.stock;
        alert('不能超過庫存數量！');
      }
      updateCartUI();
    };

    window.toggleCart = function(open) {
      const drawer = document.getElementById('cart-drawer');
      const sidebar = drawer.querySelector('.absolute.right-0');
      
      if (open) {
        drawer.classList.remove('pointer-events-none', 'opacity-0');
        sidebar.classList.remove('translate-x-full');
      } else {
        drawer.classList.add('pointer-events-none', 'opacity-0');
        sidebar.classList.add('translate-x-full');
      }
    };

    // 頁面初次載入初始化
    document.addEventListener('DOMContentLoaded', () => {
      renderCategories();
      renderProducts();
    });
  </script>
</body>
</html>
