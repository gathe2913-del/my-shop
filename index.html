
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花藝甜點點餐與收銀系統</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-50 min-h-screen pb-12">

    <script>
        const GAS_API = "https://script.google.com/macros/s/AKfycbxi_K1tMPxDNihVbIalV5zqCB2vWNRW7QCJdhep9I0EEcuIxUs-1Hd8nOViPoDukCd_-A/exec"; 
    </script>

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-md p-4">
        <div class="flex border-b mb-4">
            <button onclick="switchTab('client')" id="btn-client" class="w-1/2 py-2 text-center font-bold border-b-2 border-indigo-600 text-indigo-600">客人點餐前台</button>
            <button onclick="switchTab('admin')" id="btn-admin" class="w-1/2 py-2 text-center font-bold border-b-2 border-transparent text-gray-500">店員核銷後台</button>
        </div>

        <div id="tab-client" class="block">
            <h2 class="text-xl font-bold text-gray-800 mb-4">歡迎光臨花藝甜點店</h2>
            
            <div id="product-list" class="space-y-3 mb-6">
                <p class="text-gray-500 text-sm">正在載入最新商品選單...</p>
            </div>

            <div class="border-t pt-4 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">取貨日期 <span class="text-red-500" id="date-hint"></span></label>
                    <input type="date" id="pickup-date" class="mt-1 w-full p-2 border rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">付款方式</label>
                    <select id="payment-method" class="mt-1 w-full p-2 border rounded-md"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">客製化備註 (如：卡片內容、甜點寫字)</label>
                    <textarea id="order-note" rows="2" class="mt-1 w-full p-2 border rounded-md" placeholder="請輸入您的需求..."></textarea>
                </div>
                <button onclick="submitOrder()" id="btn-submit" class="w-full bg-indigo-600 text-white py-3 rounded-md font-bold hover:bg-indigo-700">確認預訂並生成取貨條碼</button>
            </div>

            <div id="qr-result" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
                <div class="bg-white p-6 rounded-lg max-w-sm w-full text-center space-y-4">
                    <h3 class="text-lg font-bold text-green-600">預訂成功！</h3>
                    <p class="text-xs text-gray-500">請截圖保存此 QR Code，於取貨時出示給店員掃描</p>
                    <div class="flex justify-center"><img id="qr-image" src="" alt="QR Code"></div>
                    <p class="text-sm font-mono text-gray-700" id="result-order-id"></p>
                    <button onclick="document.getElementById('qr-result').classList.add('hidden')" class="w-full bg-gray-200 text-gray-800 py-2 rounded-md">關閉</button>
                </div>
            </div>
        </div>

        <div id="tab-admin" class="hidden space-y-4">
            <h2 class="text-xl font-bold text-gray-800">店員收銀核銷系統</h2>
            
            <div class="bg-gray-100 p-2 rounded-md">
                <div id="reader" style="width: 100%;"></div>
                <button onclick="startScan()" class="w-full mt-2 bg-gray-800 text-white py-2 rounded-md text-sm font-medium">開啟相機掃描</button>
            </div>

            <div class="text-center text-gray-400 my-2">─ 或手動輸入 ─</div>
            <div class="flex space-x-2">
                <input type="text" id="manual-order-id" placeholder="輸入訂單編號 ORD-..." class="flex-1 p-2 border rounded-md text-sm">
                <button onclick="fetchOrderDetails(document.getElementById('manual-order-id').value)" class="bg-gray-600 text-white px-4 rounded-md text-sm">查詢</button>
            </div>

            <div id="order-detail-box" class="hidden border rounded-lg p-4 bg-yellow-50 space-y-3">
                <div class="flex justify-between border-b pb-2">
                    <span class="font-bold text-gray-700" id="det-id"></span>
                    <span class="px-2 py-0.5 rounded text-xs font-bold" id="det-status"></span>
                </div>
                <p class="text-sm"><strong>購買品項：</strong> <span id="det-items"></span></p>
                <p class="text-sm"><strong>應收總額：</strong> <span class="text-red-600 font-bold text-base" id="det-amount"></span> 元</p>
                <p class="text-sm"><strong>取貨日期：</strong> <span id="det-date" class="text-indigo-600 font-bold"></span></p>
                <p class="text-sm"><strong>付款模式：</strong> <span id="det-payment"></span></p>
                <p class="text-sm"><strong>客戶備註：</strong> <span id="det-note" class="text-gray-600 italic"></span></p>
                
                <button id="btn-complete-order" onclick="completeOrder()" class="w-full bg-green-600 text-white py-2 rounded-md font-bold hover:bg-green-700">確認款項正確・核銷完成</button>
            </div>
        </div>
    </div>

    <script>
        let currentProducts = [];
        let maxDaysRequired = 0;
        let activeScanOrderId = "";

        // 初始化：抓取商品資料與金流管道
        window.onload = function() {
            fetchProducts();
            // 後台可隨時新增的付款方式陣列 (這裡修改，前台自動變)
            const payments = ["LINE PAY", "現場現金", "銀行轉帳"];
            const select = document.getElementById("payment-method");
            payments.forEach(p => {
                let opt = document.createElement("option");
                opt.value = p; opt.innerText = p; select.appendChild(opt);
            });
        };

        // 頁籤切換
        function switchTab(tab) {
            if(tab === 'client') {
                document.getElementById('tab-client').classList.remove('hidden');
                document.getElementById('tab-admin').classList.add('hidden');
                document.getElementById('btn-client').className = "w-1/2 py-2 text-center font-bold border-b-2 border-indigo-600 text-indigo-600";
                document.getElementById('btn-admin').className = "w-1/2 py-2 text-center font-bold border-b-2 border-transparent text-gray-500";
            } else {
                document.getElementById('tab-client').classList.add('hidden');
                document.getElementById('tab-admin').classList.remove('hidden');
                document.getElementById('btn-client').className = "w-1/2 py-2 text-center font-bold border-b-2 border-transparent text-gray-500";
                document.getElementById('btn-admin').className = "w-1/2 py-2 text-center font-bold border-b-2 border-indigo-600 text-indigo-600";
            }
        }

        // 從 GAS 獲取最新商品
        function fetchProducts() {
            fetch(GAS_API)
            .then(res => res.json())
            .then(data => {
                currentProducts = data;
                const container = document.getElementById("product-list");
                container.innerHTML = "";
                
                data.forEach(prod => {
                    let html = `
                        <div class="flex items-center justify-between p-3 border rounded-lg bg-white shadow-sm">
                            <div>
                                <h4 class="font-bold text-gray-800">${prod.name}</h4>
                                <p class="text-sm text-red-500">$${prod.price}</p>
                                <p class="text-xs text-gray-400">手工備料：${prod.daysRequired}天</p>
                            </div>
                            <div class="flex items-center space-x-2">
                                <button onclick="changeQty('${prod.id}', -1)" class="w-8 h-8 bg-gray-200 rounded text-xl font-bold">-</button>
                                <span id="qty-${prod.id}" class="font-bold w-4 text-center">0</span>
                                <button onclick="changeQty('${prod.id}', 1)" class="w-8 h-8 bg-gray-200 rounded text-xl font-bold">+</button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += html;
                    prod.currentQty = 0;
                });
            });
        }

        // 變更購物車數量 & 核心功能：【動態計算取貨限制日】
        function changeQty(id, change) {
            let prod = currentProducts.find(p => p.id === id);
            if(!prod) return;
            prod.currentQty = Math.max(0, prod.currentQty + change);
            document.getElementById(`qty-${id}`).innerText = prod.currentQty;
            
            // 計算目前購物車內所有商品的最大製程天數
            maxDaysRequired = 0;
            currentProducts.forEach(p => {
                if(p.currentQty > 0 && p.daysRequired > maxDaysRequired) {
                    maxDaysRequired = p.daysRequired;
                }
            });

            // 控制前台日曆的最早可選日期
            const dateInput = document.getElementById("pickup-date");
            if(maxDaysRequired > 0) {
                let targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + maxDaysRequired);
                let dateStr = targetDate.toISOString().split('T')[0];
                dateInput.min = dateStr;
                dateInput.value = dateStr; // 自動幫他填入最早可取貨日
                document.getElementById("date-hint").innerText = `(含製程商品，最早取貨日為 ${maxDaysRequired} 天後)`;
            } else {
                let todayStr = new Date().toISOString().split('T')[0];
                dateInput.min = todayStr;
                document.getElementById("date-hint").innerText = "";
            }
        }

        // 客人送出訂單
        function submitOrder() {
            const selectedItems = currentProducts.filter(p => p.currentQty > 0).map(p => ({id: p.id, qty: p.currentQty}));
            const pickupDate = document.getElementById("pickup-date").value;
            if(selectedItems.length === 0) return alert("請至少選擇一樣商品！");
            if(!pickupDate) return alert("請選擇取貨日期！");

            document.getElementById("btn-submit").disabled = true;
            document.getElementById("btn-submit").innerText = "訂單處理中...";

            const payload = {
                action: "createOrder",
                items: selectedItems,
                pickupDate: pickupDate,
                paymentMethod: document.getElementById("payment-method").value,
                note: document.getElementById("order-note").value
            };

            fetch(GAS_API, { method: "POST", body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    document.getElementById("qr-image").src = res.qrCodeUrl;
                    document.getElementById("result-order-id").innerText = res.orderId;
                    document.getElementById("qr-result").classList.remove("hidden");
                    // 清空購物車
                    fetchProducts();
                    document.getElementById("order-note").value = "";
                }
                document.getElementById("btn-submit").disabled = false;
                document.getElementById("btn-submit").innerText = "確認預訂並生成取貨條碼";
            });
        }

        // 店員查詢訂單明細
        function fetchOrderDetails(orderId) {
            if(!orderId) return;
            const payload = { action: "scanOrder", orderId: orderId };
            fetch(GAS_API, { method: "POST", body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    activeScanOrderId = res.order.orderId;
                    document.getElementById("det-id").innerText = "訂單：" + res.order.orderId;
                    document.getElementById("det-items").innerText = res.order.items;
                    document.getElementById("det-amount").innerText = res.order.amount;
                    document.getElementById("det-date").innerText = res.order.pickupDate;
                    document.getElementById("det-payment").innerText = res.order.paymentMethod;
                    document.getElementById("det-note").innerText = res.order.note || "無";
                    
                    const statusBox = document.getElementById("det-status");
                    statusBox.innerText = res.order.status;
                    if(res.order.status === "已完成") {
                        statusBox.className = "px-2 py-0.5 rounded text-xs font-bold bg-green-100 text-green-800";
                        document.getElementById("btn-complete-order").classList.add("hidden");
                    } else {
                        statusBox.className = "px-2 py-0.5 rounded text-xs font-bold bg-yellow-100 text-yellow-800";
                        document.getElementById("btn-complete-order").classList.remove("hidden");
                    }
                    document.getElementById("order-detail-box").classList.remove("hidden");
                } else {
                    alert(res.message);
                }
            });
        }

        // 店員點擊核銷完成
        function completeOrder() {
            if(!activeScanOrderId) return;
            const payload = { action: "completeOrder", orderId: activeScanOrderId };
            fetch(GAS_API, { method: "POST", body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    alert(res.message);
                    fetchOrderDetails(activeScanOrderId); // 重新刷新狀態
                }
            });
        }

        // 開啟手機相機掃描 QR Code 邏輯
        function startScan() {
            const html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, // 使用後鏡頭
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    // 掃描成功，獲得訂單 ID
                    html5QrcodeScanner.stop();
                    document.getElementById("manual-order-id").value = decodedText;
                    fetchOrderDetails(decodedText);
                },
                (errorMessage) => { /* 忽略掃描中的錯誤 */ }
            ).catch(err => alert("相機開啟失敗，請檢查權限或使用 HTTPS 環境。"));
        }
    </script>
</body>
</html>
