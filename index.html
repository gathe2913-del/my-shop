<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浮光 Floating | 預訂點餐系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:ital,wght@1,500&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #fcfbf9; }
    .luxury-title { font-family: 'Playfair Display', serif; }
  </style>
</head>
<body class="text-stone-800 antialiased min-h-screen flex flex-col">

  <div id="global-loader" class="fixed inset-0 bg-stone-900/90 z-50 flex flex-col items-center justify-center text-stone-200 transition-opacity duration-300">
    <div class="w-8 h-8 border-2 border-amber-600 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-xs tracking-widest font-light">正在加載美學盛宴...</p>
  </div>

  <header class="bg-white border-b border-stone-100 py-6 px-4 text-center shadow-sm">
    <h1 id="shop-name" class="text-2xl font-bold tracking-widest text-stone-900 uppercase">浮光 Floating</h1>
    <p id="shop-subtitle" class="text-[11px] text-stone-400 mt-1 tracking-widest font-light"> Florist & Patisserie 花藝 & 甜點店</p>
  </header>

  <nav id="category-nav" class="bg-white/80 sticky top-0 backdrop-blur-md border-b border-stone-100 flex justify-center space-x-6 text-xs tracking-wider py-3 z-30 overflow-x-auto px-4">
    </nav>

  <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-6">
    <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      </div>
  </main>

  <div id="cart-bar" class="fixed bottom-0 inset-x-0 bg-stone-900 text-stone-100 p-4 transform translate-y-full transition-transform duration-300 z-40 shadow-2xl flex justify-between items-center max-w-md mx-auto rounded-t-xl">
    <div class="flex items-center space-x-3">
      <div class="relative">
        <i class="fa-solid fa-bag-shopping text-xl text-amber-500"></i>
        <span id="cart-badge" class="absolute -top-2 -right-2 bg-amber-600 text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
      </div>
      <div>
        <p class="text-xs text-stone-400 font-light">已選商品合計</p>
        <p class="text-md font-bold font-mono text-amber-400">NT$ <span id="cart-total-price">0</span></p>
      </div>
    </div>
    <button onclick="openCheckoutModal()" class="bg-amber-600 hover:bg-amber-500 text-white text-xs font-medium tracking-widest px-5 py-2.5 rounded transition-colors">
      填寫預訂明細 <i class="fa-solid fa-arrow-right ml-1 text-[10px]"></i>
    </button>
  </div>

  <div id="checkout-modal" class="fixed inset-0 bg-stone-900/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white max-w-md w-full rounded-xl shadow-2xl p-5 space-y-4 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center border-b border-stone-100 pb-2">
        <h3 class="text-sm font-bold tracking-wider text-stone-800"><i class="fa-regular fa-file-lines mr-1 text-amber-600"></i> 請填寫取貨預訂單</h3>
        <button onclick="closeCheckoutModal()" class="text-stone-400 hover:text-stone-600"><i class="fa-solid fa-xmark text-md"></i></button>
      </div>

      <div class="space-y-3 text-xs">
        <div>
          <label class="block text-stone-500 font-medium mb-1">預計到店取貨日期 *</label>
          <input type="date" id="form-date" class="w-full border border-stone-200 rounded p-2 focus:outline-none focus:border-amber-600 bg-stone-50">
        </div>
        <div>
          <label class="block text-stone-500 font-medium mb-1">首選付款管道 *</label>
          <select id="form-payment" class="w-full border border-stone-200 rounded p-2 focus:outline-none focus:border-amber-600 bg-stone-50">
            <option value="現場現金">💵 現場現金付款</option>
            <option value="LINE PAY">📱 LINE PAY 線上付</option>
            <option value="銀行轉帳">🏦 銀行提款機轉帳</option>
          </select>
        </div>
        <div>
          <label class="block text-stone-500 font-medium mb-1">客戶特殊備註 (選填)</label>
          <textarea id="form-note" rows="2" placeholder="若有卡片內容、特殊包裝需求請在此註明..." class="w-full border border-stone-200 rounded p-2 focus:outline-none focus:border-amber-600 bg-stone-50"></textarea>
        </div>
      </div>

      <button onclick="submitOrder()" class="w-full bg-stone-900 hover:bg-stone-800 text-amber-400 text-xs font-bold py-3 rounded tracking-widest transition-colors shadow-md">
        確認送出線上預訂單
      </button>
    </div>
  </div>

  <script>
    // 📌 替換為您的 GAS 網路應用程式 URL
    const API_URL = "https://script.google.com/macros/s/AKfycbyb1z9Z2U8BpxwU2n-jI39iJpU5WjL4rZ-lAclgHw-gZ2bJ9W9mI3wZgA3FpYw1Q-mP/exec";

    let localData = { settings: {}, products: [] };
    let cart = {}; // 格式: { "商品ID": 數量 }

    window.addEventListener('DOMContentLoaded', initShop);

    async function initShop() {
      try {
        const response = await fetch(API_URL);
        localData = await response.json();
        
        // 渲染動態資訊
        document.getElementById('shop-name').innerText = localData.settings.shopName || "浮光 Floating";
        document.getElementById('shop-subtitle').innerText = localData.settings.subTitle || "";
        
        renderNav(localData.settings.categories);
        renderProducts("全部");
      } catch(e) {
        alert("線上點餐系統數據庫初始化失敗，請稍後再試。");
      } finally {
        document.getElementById('global-loader').classList.add('opacity-0', 'pointer-events-none');
      }
    }

    function renderNav(catStr) {
      const nav = document.getElementById('category-nav');
      nav.innerHTML = `<button onclick="renderProducts('全部')" class="font-medium text-amber-700 border-b-2 border-amber-700 pb-1">全部品項</button>`;
      if(catStr) {
        catStr.split(',').forEach(c => {
          nav.innerHTML += `<button onclick="renderProducts('${c.trim()}')" class="font-medium text-stone-500 hover:text-stone-900 pb-1">${c.trim()}</button>`;
        });
      }
    }

    function renderProducts(filterCat) {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = "";
      
      // 僅篩選 Status 為 "M" (上架中) 的商品
      const activeProducts = localData.products.filter(p => p.status === 'M');

      activeProducts.forEach(p => {
        if(filterCat !== '全部' && p.category !== filterCat) return;

        const countInCart = cart[p.id] || 0;
        const isOutOfStock = p.stock !== -1 && p.stock <= 0;

        const card = document.createElement('div');
        card.className = "bg-white border border-stone-100 rounded-xl overflow-hidden shadow-sm flex flex-col justify-between";
        card.innerHTML = `
          <div class="relative aspect-video w-full bg-stone-100">
            <img src="${p.imageUrl || 'https://via.placeholder.com/400x225'}" alt="" class="w-full h-full object-cover">
            ${isOutOfStock ? `<div class="absolute inset-0 bg-black/50 text-white flex items-center justify-center font-bold text-xs tracking-wider">今日已全數售罄</div>` : ''}
          </div>
          <div class="p-4 space-y-2 flex-grow flex flex-col justify-between">
            <div>
              <div class="flex justify-between items-start">
                <h4 class="font-bold text-stone-900 text-sm">${p.name}</h4>
                <span class="text-stone-700 font-mono text-sm font-bold">NT$ ${p.price}</span>
              </div>
              <p class="text-[11px] text-stone-400 mt-1">${p.note || '精心手作調配'}</p>
              <p class="text-[10px] text-amber-700 bg-amber-50 inline-block px-1.5 py-0.5 rounded mt-1">🕒 製程需 ${p.daysRequired} 天</p>
            </div>

            <div class="pt-3 flex justify-between items-center border-t border-stone-50">
              <span class="text-[10px] text-stone-400 font-mono">庫存量: ${p.stock === -1 ? '不限' : p.stock}</span>
              <div class="flex items-center space-x-2">
                ${countInCart > 0 ? `
                  <button onclick="changeQty('${p.id}', -1)" class="w-6 h-6 rounded-full border border-stone-200 flex items-center justify-center hover:bg-stone-50 text-xs"><i class="fa-solid fa-minus"></i></button>
                  <span class="font-mono text-xs font-bold w-4 text-center">${countInCart}</span>
                ` : ''}
                <button onclick="changeQty('${p.id}', 1)" ${isOutOfStock ? 'disabled' : ''} class="w-6 h-6 rounded-full bg-stone-900 hover:bg-stone-800 text-white flex items-center justify-center text-xs disabled:bg-stone-200 disabled:cursor-not-allowed">
                  <i class="fa-solid fa-plus"></i>
                </button>
              </div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function changeQty(id, delta) {
      const p = localData.products.find(prod => prod.id === id);
      let current = cart[id] || 0;
      let target = current + delta;

      if(target <= 0) {
        delete cart[id];
      } else {
        // 嚴格阻擋超出試算表設定之現貨存量
        if(p.stock !== -1 && target > p.stock) {
          alert(`非常抱歉！目前 [${p.name}] 的預訂現貨上限為 ${p.stock} 件。`);
          return;
        }
        cart[id] = target;
      }
      updateCartUI();
      renderProducts("全部");
    }

    function updateCartUI() {
      let totalCount = 0;
      let totalPrice = 0;
      
      for(let id in cart) {
        let p = localData.products.find(prod => prod.id === id);
        totalCount += cart[id];
        totalPrice += p.price * cart[id];
      }

      document.getElementById('cart-badge').innerText = totalCount;
      document.getElementById('cart-total-price').innerText = totalPrice;

      const bar = document.getElementById('cart-bar');
      if(totalCount > 0) {
        bar.classList.remove('translate-y-full');
      } else {
        bar.classList.add('translate-y-full');
      }
    }

    function openCheckoutModal() { document.getElementById('checkout-modal').classList.remove('hidden'); }
    function closeCheckoutModal() { document.getElementById('checkout-modal').classList.add('hidden'); }

    async function submitOrder() {
      const dateVal = document.getElementById('form-date').value;
      const paymentVal = document.getElementById('form-payment').value;
      const noteVal = document.getElementById('form-note').value;

      if(!dateVal) { alert("請指定希望到店取貨的日期！"); return; }

      document.getElementById('global-loader').classList.remove('opacity-0', 'pointer-events-none');
      
      // 封裝對齊後端的結構項目明細
      let itemsPayload = [];
      for(let id in cart) {
        itemsPayload.push({ id: id, count: cart[id] });
      }

      const payload = {
        action: "createOrder",
        pickupDate: dateVal,
        paymentMethod: paymentVal,
        note: noteVal,
        items: itemsPayload
      };

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        const res = await response.json();
        if(res.status === "success") {
          alert(`🎉 預訂單成功送出！\n您的專屬訂單編號為：${res.orderId}\n請妥善保存，現場取貨時出示此編號。`);
          cart = {};
          updateCartUI();
          closeCheckoutModal();
          initShop();
        } else {
          alert(`訂單送出失敗：${res.message}`);
        }
      } catch(e) {
        alert("通訊崩潰，請檢查網路。");
      } finally {
        document.getElementById('global-loader').classList.add('opacity-0', 'pointer-events-none');
      }
    }
  </script>
</body>
</html>
