<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浮光 Floating | 員工後台管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Playfair+Display:wght@600&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f5f7; color: #333; }
    .font-serif-luxury { font-family: 'Playfair Display', serif; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <div id="admin-loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900/80 text-white transition-opacity duration-300">
    <div class="w-10 h-10 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-sm tracking-widest text-slate-300 animate-pulse">正在同步試算表大數據...</p>
  </div>

  <header class="bg-slate-800 text-white px-6 py-4 flex flex-col sm:flex-row justify-between items-center shadow-md shrink-0">
    <div class="flex items-center space-x-3 mb-2 sm:mb-0">
      <i class="fa-solid fa-screwdriver-wrench text-amber-500 text-xl"></i>
      <div>
        <h1 class="font-medium tracking-wide text-md">浮光 Floating | 核心運營管理後台</h1>
        <p class="text-[10px] text-slate-400 font-mono">GAS Data Hub Sync Engine v2.5</p>
      </div>
    </div>
    <button onclick="toggleScannerModal()" class="bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold px-4 py-2 rounded-lg flex items-center space-x-2 shadowtransition-colors">
      <i class="fa-solid fa-camera text-sm"></i>
      <span>開啟相機掃描核銷</span>
    </button>
  </header>

  <div class="bg-white border-b border-slate-200 shadow-sm flex">
    <button onclick="switchTab('orders-tab')" id="btn-orders-tab" class="px-6 py-3.5 text-sm font-medium border-b-2 border-amber-600 text-amber-600 transition-all flex items-center space-x-2">
      <i class="fa-solid fa-list-check"></i> <span>預訂訂單管理</span>
    </button>
    <button onclick="switchTab('products-tab')" id="btn-products-tab" class="px-6 py-3.5 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800 transition-all flex items-center space-x-2">
      <i class="fa-solid fa-box-archive"></i> <span>商品上架與庫存維護</span>
    </button>
  </div>

  <main class="flex-grow p-4 sm:p-6 overflow-auto max-w-7xl w-full mx-auto">
    
    <section id="orders-tab" class="tab-content active space-y-4">
      <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-2 bg-white p-4 rounded-lg shadow-sm">
        <div class="relative flex-grow max-w-md">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-400 text-sm"></i>
          <input type="text" id="order-search" oninput="filterOrders()" placeholder="搜尋訂單編號、日期、備註或付款方式..." class="w-full pl-9 pr-4 py-1.5 text-sm rounded border border-slate-200 bg-slate-50 focus:outline-none focus:border-amber-500">
        </div>
        <div class="flex items-center space-x-2 text-xs">
          <span class="text-slate-500">快速狀態過濾：</span>
          <select id="order-status-filter" onchange="filterOrders()" class="bg-white border border-slate-200 rounded px-2 py-1 focus:outline-none">
            <option value="all">全部訂單 (未取消)</option>
            <option value="新預訂">新預訂</option>
            <option value="處理中">處理中</option>
            <option value="可取貨">可取貨</option>
            <option value="已完成">已完成</option>
            <option value="已取消">已取消</option>
          </select>
        </div>
      </div>

      <div id="orders-container" class="space-y-3">
        </div>
    </section>

    <section id="products-tab" class="tab-content space-y-4">
      <div class="bg-white p-4 rounded-lg shadow-sm flex justify-between items-center">
        <h3 class="text-sm font-bold text-slate-700"><i class="fa-solid fa-cubes text-amber-500 mr-1"></i> 全品項庫存與狀態矩陣</h3>
        <p class="text-[11px] text-slate-400">變更數值後請記得點擊該列的「儲存」按鈕</p>
      </div>

      <div class="bg-white rounded-lg shadow-sm overflow-hidden border border-slate-200">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-50 text-slate-600 text-xs font-bold uppercase border-b border-slate-200">
                <th class="p-4 w-20">商品圖片</th>
                <th class="p-4">商品名稱 / ID</th>
                <th class="p-4 w-28">分類</th>
                <th class="p-4 w-24">價格</th>
                <th class="p-4 w-24">製程天數</th>
                <th class="p-4 w-24">當前庫存</th>
                <th class="p-4 w-28">前台狀態</th>
                <th class="p-4 w-24 text-center">操作</th>
              </tr>
            </thead>
            <tbody id="products-table-body" class="text-sm divide-y divide-slate-100">
              </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="scanner-modal" class="fixed inset-0 z-50 bg-black/70 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl max-w-sm w-full overflow-hidden shadow-2xl">
      <div class="bg-slate-800 text-white px-4 py-3 flex justify-between items-center">
        <span class="text-xs font-bold tracking-wider"><i class="fa-solid fa-qrcode text-amber-500 mr-1"></i> 請對準顧客的手機 QR Code</span>
        <button onclick="toggleScannerModal()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <div class="p-4">
        <div id="qr-reader" class="w-full bg-black rounded-lg overflow-hidden"></div>
        <p class="text-[11px] text-slate-500 mt-2 text-center">授權相機權限後，自動辨識訂單編號完成核銷對照。</p>
      </div>
    </div>
  </div>

  <script>
    // 📌 替換為您的 Google Apps Script 網路應用程式 URL
    const API_URL = "https://script.google.com/macros/s/AKfycbxi_K1tMPxDNihVbIalV5zqCB2vWNRW7QCJdhep9I0EEcuIxUs-1Hd8nOViPoDukCd_-A/exec";

    let adminData = { settings: {}, products: [], orders: [] };
    let html5QrcodeScanner = null;

    window.addEventListener('DOMContentLoaded', fetchAdminData);

    // 🔄 異步拉取所有後台大數據
    async function fetchAdminData() {
      showLoader(true);
      try {
        const response = await fetch(API_URL);
        adminData = await response.json();
        
        // 分別渲染兩大區塊
        renderOrders();
        renderProductsTable();
      } catch (error) {
        alert("後台引擎資料同步失敗！請確認 GAS 指令部署狀態。");
        console.error(error);
      } finally {
        showLoader(false);
      }
    }

    function showLoader(show) {
      const loader = document.getElementById('admin-loader');
      if (show) {
        loader.classList.remove('opacity-0', 'pointer-events-none');
      } else {
        loader.classList.add('opacity-0', 'pointer-events-none');
      }
    }

    // 📄 標籤頁切換
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');

      const btnOrders = document.getElementById('btn-orders-tab');
      const btnProducts = document.getElementById('btn-products-tab');

      if (tabId === 'orders-tab') {
        btnOrders.className = "px-6 py-3.5 text-sm font-medium border-b-2 border-amber-600 text-amber-600 transition-all flex items-center space-x-2";
        btnProducts.className = "px-6 py-3.5 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800 transition-all flex items-center space-x-2";
      } else {
        btnOrders.className = "px-6 py-3.5 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800 transition-all flex items-center space-x-2";
        btnProducts.className = "px-6 py-3.5 text-sm font-medium border-b-2 border-amber-600 text-amber-600 transition-all flex items-center space-x-2";
      }
    }

    // 📑 訂單渲染引擎
    function renderOrders() {
      const container = document.getElementById('orders-container');
      container.innerHTML = "";

      if(!adminData.orders || adminData.orders.length === 0) {
        container.innerHTML = `<div class="bg-white p-8 text-center text-xs text-slate-400 rounded-lg shadow-sm">目前試算表中暫無任何歷史預訂訂單。</div>`;
        return;
      }

      // 將最新的訂單排在最上方
      const sortedOrders = [...adminData.orders].reverse();

      sortedOrders.forEach(order => {
        const card = document.createElement('div');
        card.id = `order-card-${order.orderId}`;
        card.className = "bg-white border border-slate-200 rounded-lg p-4 shadow-sm flex flex-col md:flex-row justify-between gap-4 transition-all duration-300";
        
        // 狀態顏色映射
        let statusBadgeColor = "bg-slate-100 text-slate-700";
        if(order.orderStatus === "新預訂") statusBadgeColor = "bg-blue-50 text-blue-600 border border-blue-200";
        if(order.orderStatus === "處理中") statusBadgeColor = "bg-amber-50 text-amber-600 border border-amber-200";
        if(order.orderStatus === "可取貨") statusBadgeColor = "bg-purple-50 text-purple-600 border border-purple-200";
        if(order.orderStatus === "已完成") statusBadgeColor = "bg-green-50 text-green-600 border border-green-200";
        if(order.orderStatus === "已取消") statusBadgeColor = "bg-rose-50 text-rose-500";

        card.innerHTML = `
          <div class="space-y-2 flex-grow">
            <div class="flex flex-wrap items-center gap-2">
              <span class="font-mono text-xs font-bold text-slate-700 bg-slate-100 px-2 py-0.5 rounded">${order.orderId}</span>
              <span class="text-xs font-medium text-slate-500"><i class="fa-regular fa-calendar-check mr-1"></i>取貨日：${order.pickupDate}</span>
              <span class="text-xs ${statusBadgeColor} font-bold px-2 py-0.5 rounded text-[11px]">${order.orderStatus}</span>
            </div>
            
            <div class="bg-slate-50 p-2.5 rounded text-xs text-slate-700 font-mono space-y-1 border border-slate-100">
              ${order.summary}
            </div>

            <div class="text-xs text-slate-500 flex flex-wrap gap-x-4 gap-y-1">
              <span><i class="fa-solid fa-wallet text-slate-400 mr-1"></i>付款：${order.paymentMethod}</span>
              <span><i class="fa-solid fa-comment-dots text-slate-400 mr-1"></i>備註：<span class="text-slate-700">${order.note || '無'}</span></span>
            </div>
          </div>

          <div class="flex flex-col sm:flex-row md:flex-col justify-end items-end gap-2 min-w-[180px] pt-3 md:pt-0 border-t md:border-t-0 border-slate-100">
            <div class="text-right w-full">
              <p class="text-[10px] text-slate-400 uppercase tracking-wider">合計總金額</p>
              <p class="text-lg font-bold text-slate-800 font-mono">NT$ ${order.totalAmount}</p>
            </div>
            
            <div class="grid grid-cols-2 gap-1 w-full">
              <button onclick="updateOrderField('${order.orderId}', 'paymentStatus', '${order.paymentStatus === '已付款' ? '未付款' : '已付款'}')" class="text-[11px] font-medium py-1 px-2 rounded border text-center transition-colors ${order.paymentStatus === '已付款' ? 'bg-green-50 border-green-200 text-green-700' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}">
                <i class="fa-solid fa-money-bill-wave mr-1"></i>${order.paymentStatus}
              </button>
              
              <button onclick="updateOrderField('${order.orderId}', 'checkStatus', '${order.checkStatus === '已核銷' ? '未核銷' : '已核銷'}')" class="text-[11px] font-medium py-1 px-2 rounded border text-center transition-colors ${order.checkStatus === '已核銷' ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}">
                <i class="fa-solid fa-stamp mr-1"></i>${order.checkStatus}
              </button>
            </div>

            <select onchange="updateOrderField('${order.orderId}', 'orderStatus', this.value)" class="text-xs bg-slate-800 text-white rounded px-2 py-1 w-full font-medium focus:outline-none">
              <option value="" disabled selected>變更訂單狀態...</button>
              <option value="新預訂">📌 設為：新預訂</option>
              <option value="處理中">⏳ 設為：處理中</option>
              <option value="可取貨">🛍️ 設為：可取貨</option>
              <option value="已完成">✅ 設為：交易完成</option>
              <option value="已取消">❌ 設為：取消/廢棄</option>
            </select>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // 🔍 搜尋與狀態即時過濾
    function filterOrders() {
      const query = document.getElementById('order-search').value.toLowerCase();
      const statusFilter = document.getElementById('order-status-filter').value;
      
      adminData.orders.forEach(order => {
        const card = document.getElementById(`order-card-${order.orderId}`);
        if(!card) return;

        const matchesSearch = order.orderId.toLowerCase().includes(query) || 
                              order.summary.toLowerCase().includes(query) || 
                              order.note.toLowerCase().includes(query) ||
                              order.paymentMethod.toLowerCase().includes(query);
        
        let matchesStatus = true;
        if(statusFilter !== 'all') {
          matchesStatus = (order.orderStatus === statusFilter);
        } else {
          // 'all' 模式下默認隱藏已取消的項目
          matchesStatus = (order.orderStatus !== '已取消');
        }

        if(matchesSearch && matchesStatus) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    }

    // 📦 商品表格資料渲染
    function renderProductsTable() {
      const tbody = document.getElementById('products-table-body');
      tbody.innerHTML = "";

      if(!adminData.products || adminData.products.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="p-8 text-center text-xs text-slate-400">尚無商品矩陣資料。</td></tr>`;
        return;
      }

      adminData.products.forEach(p => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50 transition-colors";
        tr.innerHTML = `
          <td class="p-4">
            <img src="${p.imageUrl}" alt="" class="w-10 h-10 object-cover rounded bg-slate-100">
          </td>
          <td class="p-4">
            <p class="font-bold text-slate-800">${p.name}</p>
            <p class="text-[10px] text-slate-400 font-mono">${p.id}</p>
          </td>
          <td class="p-4 text-slate-500">${p.category}</td>
          <td class="p-4 font-mono font-bold text-slate-700">NT$ ${p.price}</td>
          <td class="p-4 text-slate-600 font-mono">${p.daysRequired} 天</td>
          <td class="p-4">
            <input type="number" id="p-stock-${p.id}" value="${p.stock}" class="w-16 border border-slate-200 rounded px-1.5 py-0.5 font-mono text-center text-xs bg-slate-50 focus:bg-white focus:border-amber-500">
          </td>
          <td class="p-4">
            <select id="p-status-${p.id}" class="text-xs bg-white border border-slate-200 rounded px-1.5 py-1 focus:outline-none">
              <option value="M" ${p.status === 'M' ? 'selected' : ''}>上架中 (M)</option>
              <option value="下架" ${p.status === '下架' ? 'selected' : ''}>🚫 已下架</option>
            </select>
          </td>
          <td class="p-4 text-center">
            <button onclick="saveProductRow('${p.id}')" class="bg-slate-700 hover:bg-slate-900 text-white text-[11px] font-bold px-2.5 py-1 rounded transition-colors shadow-sm">
              儲存
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // 🔄 API：變更訂單各欄位
    async function updateOrderField(orderId, field, newValue) {
      showLoader(true);
      const payload = {
        action: "updateOrderField",
        orderId: orderId,
        field: field,
        value: newValue
      };

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if(result.status === "success") {
          // 重新整理資料快照
          await fetchAdminData();
        } else {
          alert(`更新失敗：${result.message}`);
          showLoader(false);
        }
      } catch (error) {
        alert("通訊故障，變更未成功保存！");
        showLoader(false);
      }
    }

    // 🔄 API：保存商品單列的修改（庫存與狀態）
    async function saveProductRow(id) {
      const stockVal = parseInt(document.getElementById(`p-stock-${id}`).value);
      const statusVal = document.getElementById(`p-status-${id}`).value;

      if(isNaN(stockVal)) {
        alert("庫存必須填寫有效的整數數字！(-1 代表無限庫存)");
        return;
      }

      showLoader(true);
      const payload = {
        action: "updateProductRow",
        id: id,
        stock: stockVal,
        status: statusVal
      };

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if(result.status === "success") {
          await fetchAdminData();
        } else {
          alert(`商品更新失敗：${result.message}`);
          showLoader(false);
        }
      } catch (error) {
        alert("網路異常，商品設定更新未成功！");
        showLoader(false);
      }
    }

    // 📸 手機相機核銷燈箱控制
    function toggleScannerModal() {
      const modal = document.getElementById('scanner-modal');
      if(modal.classList.contains('hidden')) {
        modal.classList.remove('hidden');
        startQrScanner();
      } else {
        modal.classList.add('hidden');
        stopQrScanner();
      }
    }

    function startQrScanner() {
      html5QrcodeScanner = new Html5Qrcode("qr-reader");
      const config = { fps: 10, qrbox: { width: 220, height: 220 } };
      
      html5QrcodeScanner.start(
        { facingMode: "environment" }, // 優先調用後置鏡頭
        config,
        (decodedText) => {
          // 成功掃描到 QR Code
          stopQrScanner();
          document.getElementById('scanner-modal').classList.add('hidden');
          
          // 在搜尋框內填入該 OrderID 並高亮過濾
          const searchInput = document.getElementById('order-search');
          searchInput.value = decodedText;
          filterOrders();
          
          // 定位並視覺震盪高亮該訂單
          setTimeout(() => {
            const targetCard = document.getElementById(`order-card-${decodedText}`);
            if(targetCard) {
              targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
              targetCard.classList.add('bg-amber-100', 'border-amber-500', 'scale-[1.02]');
              setTimeout(() => {
                targetCard.classList.remove('bg-amber-100', 'border-amber-500', 'scale-[1.02]');
              }, 3000);
            } else {
              alert(`已掃描成功，編號為：${decodedText}，但後台列表中找不到對應訂單！`);
            }
          }, 400);
        },
        (errorMessage) => {
          // 靜默容錯，持續掃描
        }
      ).catch(err => {
        console.error("無法啟動相機：", err);
      });
    }

    function stopQrScanner() {
      if(html5QrcodeScanner) {
        html5QrcodeScanner.stop().then(() => {
          html5QrcodeScanner = null;
        }).catch(err => console.error(err));
      }
    }
  </script>
</body>
</html>
