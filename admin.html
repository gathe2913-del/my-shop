<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浮光 Floating | 員工核心核銷與數據矩陣</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Playfair+Display:wght@600&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f5f7; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <div id="admin-loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-900/80 text-white transition-opacity duration-300">
    <div class="w-10 h-10 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-sm tracking-widest text-slate-300">正在變更並發送操作至審計 Log 矩陣...</p>
  </div>

  <header class="bg-slate-800 text-white px-6 py-4 flex flex-col sm:flex-row justify-between items-center shadow-md">
    <div class="flex items-center space-x-3 mb-2 sm:mb-0">
      <i class="fa-solid fa-screwdriver-wrench text-amber-500 text-xl"></i>
      <div>
        <h1 id="brand-title" class="font-medium tracking-wide text-md">浮光 Floating | 核心運營管理後台</h1>
        <p class="text-[10px] text-slate-400 font-mono">Audit Log & User Permission Guard v3.0</p>
      </div>
    </div>
    
    <div class="flex items-center space-x-2 bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-700">
      <i class="fa-solid fa-user-shield text-amber-500 text-xs"></i>
      <span class="text-xs text-slate-400">登入店員工號:</span>
      <input type="text" id="operator-id" placeholder="例如 SS123" class="bg-slate-800 text-amber-400 text-xs font-mono font-bold rounded px-2 py-0.5 w-20 border border-slate-600 focus:outline-none focus:border-amber-500 text-center">
    </div>
  </header>

  <div class="bg-white border-b border-slate-200 flex shadow-sm">
    <button onclick="switchTab('orders-tab')" id="btn-orders-tab" class="px-6 py-3.5 text-sm font-medium border-b-2 border-amber-600 text-amber-600 flex items-center space-x-2">
      <i class="fa-solid fa-list-check"></i> <span>Order_Log 訂單核銷作業</span>
    </button>
    <button onclick="switchTab('products-tab')" id="btn-products-tab" class="px-6 py-3.5 text-sm font-medium border-b-2 border-transparent text-slate-500 flex items-center space-x-2">
      <i class="fa-solid fa-box-archive"></i> <span>Product_List 庫存與狀態矩陣</span>
    </button>
  </div>

  <main class="flex-grow p-4 sm:p-6 overflow-auto max-w-7xl w-full mx-auto">
    
    <section id="orders-tab" class="tab-content active space-y-4">
      <div class="bg-white p-4 rounded-lg shadow-sm flex flex-col sm:flex-row justify-between items-center gap-3">
        <div class="relative flex-grow max-w-md w-full">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-slate-400 text-sm"></i>
          <input type="text" id="order-search" oninput="filterOrders()" placeholder="過濾搜尋訂單編號、明細品項、付款方式..." class="w-full pl-9 pr-4 py-1.5 text-sm rounded border border-slate-200 bg-slate-50 focus:outline-none">
        </div>
        <button onclick="toggleScannerModal()" class="bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold px-4 py-2 rounded flex items-center space-x-2">
          <i class="fa-solid fa-camera"></i> <span>手機鏡頭掃碼核銷</span>
        </button>
      </div>

      <div id="orders-container" class="space-y-3">
        </div>
    </section>

    <section id="products-tab" class="tab-content space-y-4">
      <div class="bg-white rounded-lg shadow-sm overflow-hidden border border-slate-200">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-50 text-slate-600 text-xs font-bold border-b border-slate-200">
                <th class="p-4 w-20">縮圖</th>
                <th class="p-4">商品名稱 / ID</th>
                <th class="p-4">類別</th>
                <th class="p-4">售價</th>
                <th class="p-4">成本</th>
                <th class="p-4 w-24">目前庫存</th>
                <th class="p-4 w-32">前台Status</th>
                <th class="p-4 w-24 text-center">指令</th>
              </tr>
            </thead>
            <tbody id="products-table-body" class="text-sm divide-y divide-slate-100">
              </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="scanner-modal" class="fixed inset-0 z-50 bg-black/70 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-xl max-w-sm w-full overflow-hidden shadow-2xl">
      <div class="bg-slate-800 text-white px-4 py-3 flex justify-between items-center">
        <span class="text-xs font-bold"><i class="fa-solid fa-qrcode text-amber-500 mr-1"></i> 請對準訂單 QR 碼</span>
        <button onclick="toggleScannerModal()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="p-4">
        <div id="qr-reader" class="w-full bg-black rounded-lg overflow-hidden"></div>
      </div>
    </div>
  </div>

  <script>
    // 📌 替換為您的 GAS 網路應用程式 URL
    const API_URL = "https://script.google.com/macros/s/AKfycbyb1z9Z2U8BpxwU2n-jI39iJpU5WjL4rZ-lAclgHw-gZ2bJ9W9mI3wZgA3FpYw1Q-mP/exec";

    let adminData = { settings: {}, products: [], orders: [] };
    let html5QrcodeScanner = null;

    window.addEventListener('DOMContentLoaded', fetchAdminSnapshots);

    async function fetchAdminSnapshots() {
      showLoader(true);
      try {
        const response = await fetch(API_URL);
        adminData = await response.json();
        document.getElementById('brand-title').innerText = (adminData.settings.shopName || "浮光 Floating") + " | 核心營運後台";
        renderOrders();
        renderProductsTable();
      } catch (e) {
        alert("同步試算表失敗，請核對 GAS 中 SPREADSHEET_ID 權限！");
      } finally {
        showLoader(false);
      }
    }

    function showLoader(show) {
      const loader = document.getElementById('admin-loader');
      if (show) loader.classList.remove('opacity-0', 'pointer-events-none');
      else loader.classList.add('opacity-0', 'pointer-events-none');
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      const btnOrders = document.getElementById('btn-orders-tab');
      const btnProducts = document.getElementById('btn-products-tab');
      if (tabId === 'orders-tab') {
        btnOrders.className = "px-6 py-3.5 text-sm font-medium border-b-2 border-amber-600 text-amber-600 flex items-center space-x-2";
        btnProducts.className = "px-6 py-3.5 text-sm font-medium border-b-2 border-transparent text-slate-500 flex items-center space-x-2";
      } else {
        btnOrders.className = "px-6 py-3.5 text-sm font-medium border-b-2 border-transparent text-slate-500 flex items-center space-x-2";
        btnProducts.className = "px-6 py-3.5 text-sm font-medium border-b-2 border-amber-600 text-amber-600 flex items-center space-x-2";
      }
    }

    // 📑 渲染 Order_Log 訂單卡片
    function renderOrders() {
      const container = document.getElementById('orders-container');
      container.innerHTML = "";
      
      if(!adminData.orders || adminData.orders.length === 0) {
        container.innerHTML = `<div class="bg-white p-8 text-center text-xs text-slate-400 rounded-lg">Order_Log 工作表中尚無任何歷史訂單資料。</div>`;
        return;
      }

      // 倒序排列，讓最新訂單呈現在最上方
      const sorted = [...adminData.orders].reverse();

      sorted.forEach(order => {
        let badgeColor = "bg-amber-50 text-amber-600 border border-amber-200";
        if(order.status === "已完成") badgeColor = "bg-green-50 text-green-600 border border-green-200";
        if(order.status === "已取消") badgeColor = "bg-rose-50 text-rose-500 border border-rose-200";

        const card = document.createElement('div');
        card.id = `order-card-${order.id}`;
        card.className = "bg-white border border-slate-200 rounded-xl p-4 shadow-sm flex flex-col md:flex-row justify-between gap-4";
        card.innerHTML = `
          <div class="space-y-2 flex-grow">
            <div class="flex flex-wrap items-center gap-2">
              <span class="font-mono text-xs font-bold text-slate-700 bg-slate-100 px-2 py-0.5 rounded border">${order.id}</span>
              <span class="text-xs font-medium text-slate-500"><i class="fa-regular fa-calendar mr-1"></i>取貨日期：<strong class="text-slate-800">${order.pickupDate}</strong></span>
              <span class="text-xs ${badgeColor} px-2 py-0.5 rounded text-[11px] font-bold">${order.status}</span>
            </div>
            <div class="bg-slate-50 p-2.5 rounded text-xs font-mono border text-slate-700">
              <i class="fa-solid fa-basket-shopping text-slate-400 mr-1"></i>${order.items}
            </div>
            <div class="text-[11px] text-slate-500 flex flex-wrap gap-x-4">
              <span>付款：<strong class="text-slate-700">${order.payment}</strong></span>
              <span>備註：<span class="text-slate-600">${order.note || '無'}</span></span>
              <span class="text-slate-400 italic">成立時間: ${order.createdAt}</span>
            </div>
          </div>
          <div class="flex flex-col justify-between items-end min-w-[200px] border-t md:border-t-0 pt-2 md:pt-0 border-slate-100">
            <div class="text-right w-full">
              <span class="text-[10px] text-slate-400 block">總金額 / 純利潤</span>
              <span class="text-md font-bold font-mono text-slate-800">NT$ ${order.amount}</span>
              <span class="text-xs font-mono text-green-600 block">利潤: +${order.profit}</span>
              <span class="text-[10px] text-slate-400 font-mono block">經手店員: ${order.handler || '👤 尚未核銷'}</span>
            </div>
            <div class="flex gap-1.5 w-full mt-2">
              <select onchange="updateStatus('${order.id}', this.value)" class="text-xs bg-slate-800 text-white rounded p-1.5 w-full font-medium focus:outline-none cursor-pointer">
                <option value="" disabled selected>更改訂單狀態...</option>
                <option value="處理中">⏳ 標記為: 處理中</option>
                <option value="已完成">✅ 現場核銷: 交易完成</option>
                <option value="已取消">❌ 標記為: 取消/廢棄</option>
              </select>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // ⚡ 執行 Order_Log 狀態變更 (內嵌員工工號檢驗)
    async function updateStatus(orderId, nextStatus) {
      const opId = document.getElementById('operator-id').value.trim();
      if(!opId) { alert("【權限拒絕】請先在頂部輸入您的店員工號（如 SS123）再進行操作！"); fetchAdminSnapshots(); return; }
      
      showLoader(true);
      const payload = {
        action: "updateOrderStatus",
        orderId: orderId,
        status: nextStatus,
        operator: opId
      };

      try {
        const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        const res = await response.json();
        if(res.status === "success") {
          await fetchAdminSnapshots();
        } else {
          alert(`操作失敗：${res.message}`);
          showLoader(false);
        }
      } catch(e) {
        alert("發送故障，請確認網路連線。");
        showLoader(false);
      }
    }

    // 📦 渲染 Product_List 商品矩陣
    function renderProductsTable() {
      const tbody = document.getElementById('products-table-body');
      tbody.innerHTML = "";

      adminData.products.forEach(p => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50 transition-colors";
        tr.innerHTML = `
          <td class="p-4"><img src="${p.imageUrl || 'https://via.placeholder.com/150'}" class="w-10 h-10 object-cover rounded border"></td>
          <td class="p-4">
            <p class="font-bold text-slate-800">${p.name}</p>
            <p class="text-[10px] text-slate-400 font-mono">${p.id}</p>
          </td>
          <td class="p-4 text-slate-500">${p.category}</td>
          <td class="p-4 font-mono font-bold text-slate-700">NT$ ${p.price}</td>
          <td class="p-4 font-mono text-slate-400">NT$ ${p.cost}</td>
          <td class="p-4">
            <input type="number" id="stock-${p.id}" value="${p.stock}" class="w-16 border rounded text-center text-xs p-1 font-mono bg-slate-50 focus:bg-white">
          </td>
          <td class="p-4">
            <select id="status-${p.id}" class="text-xs bg-white border rounded p-1 focus:outline-none cursor-pointer">
              <option value="M" ${p.status === 'M' ? 'selected' : ''}>上架中 (M)</option>
              <option value="下架" ${p.status === '下架' ? 'selected' : ''}>🚫 已下架</option>
            </select>
          </td>
          <td class="p-4 text-center">
            <button onclick="saveProductRow('${p.id}')" class="bg-slate-700 hover:bg-slate-900 text-white text-[11px] font-bold px-3 py-1 rounded shadow-sm">
              儲存
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // ⚡ 執行 Product_List 單列庫存/狀態修改 (內嵌員工工號檢驗)
    async function saveProductRow(id) {
      const opId = document.getElementById('operator-id').value.trim();
      if(!opId) { alert("【權限拒絕】請先在頂部輸入您的店員工號（如 SS123）再進行操作！"); return; }

      const targetStock = parseInt(document.getElementById(`stock-${id}`).value);
      const targetStatus = document.getElementById(`status-${id}`).value;

      if(isNaN(targetStock)) { alert("庫存必須填寫有效整數！"); return; }

      showLoader(true);
      const payload = {
        action: "updateProductRow",
        id: id,
        stock: targetStock,
        status: targetStatus,
        operator: opId
      };

      try {
        const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        const res = await response.json();
        if(res.status === "success") {
          alert("商品主檔變更成功，Log 已審計，前台已即時連動！");
          await fetchAdminSnapshots();
        } else {
          alert(`修改失敗：${res.message}`);
          showLoader(false);
        }
      } catch(e) {
        alert("通訊失敗。");
        showLoader(false);
      }
    }

    function filterOrders() {
      const q = document.getElementById('order-search').value.toLowerCase();
      adminData.orders.forEach(o => {
        const card = document.getElementById(`order-card-${o.id}`);
        if(!card) return;
        const match = o.id.toLowerCase().includes(q) || o.items.toLowerCase().includes(q) || o.payment.toLowerCase().includes(q);
        if(match) card.classList.remove('hidden');
        else card.classList.add('hidden');
      });
    }

    function toggleScannerModal() {
      const m = document.getElementById('scanner-modal');
      if(m.classList.contains('hidden')) { m.classList.remove('hidden'); startScanner(); }
      else { m.classList.add('hidden'); stopScanner(); }
    }

    function startScanner() {
      html5QrcodeScanner = new Html5Qrcode("qr-reader");
      html5QrcodeScanner.start(
        { facingMode: "environment" }, { fps: 10, qrbox: 230 },
        (txt) => {
          stopScanner();
          document.getElementById('scanner-modal').classList.add('hidden');
          document.getElementById('order-search').value = txt;
          filterOrders();
          setTimeout(() => {
            const card = document.getElementById(`order-card-${txt}`);
            if(card) {
              card.scrollIntoView({ behavior: 'smooth', block: 'center' });
              card.classList.add('bg-amber-50', 'border-amber-500');
            }
          }, 300);
        }, (err) => {}
      ).catch(e => console.error(e));
    }

    function stopScanner() {
      if(html5QrcodeScanner) { html5QrcodeScanner.stop().then(() => { html5QrcodeScanner = null; }); }
    }
  </script>
</body>
</html>
